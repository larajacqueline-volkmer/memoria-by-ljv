<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Einstellungen · Memoria</title>

  <meta name="theme-color" content="#0f0f1a" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="style.css" />
  <script defer src="main.js"></script>
</head>
<body>
  <!-- Globale Top-Navigation (fixiert oben). Klasse bleibt bottom-nav laut CSS -->
  <nav class="bottom-nav">
    <a href="index.html" >Home</a>
    <a href="learn.html" >Lernen</a>
    <a href="decks.html" >Decks</a>
    <a href="quests.html" >Quests</a>
    <a href="stats.html" >Stats</a>
    <a href="pdf.html" >PDF</a>
    <a href="settings.html" aria-current="page">Einstellungen</a>
  </nav>

  <div class="container layout">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <div class="app-title">Memoria</div>
          <div class="subtitle">Behalte, was zählt.</div>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html" >Home</a>
        <a href="learn.html" >Lernen</a>
        <a href="decks.html" >Decks</a>
        <a href="quests.html" >Quests</a>
        <a href="stats.html" >Statistik</a>
        <a href="pdf.html" >PDF</a>
        <a href="settings.html" aria-current="page">Einstellungen</a>
      </nav>

      <div class="cta">
        <button class="btn">Install</button>
        <button class="btn ghost">Login</button>
      </div>

      <footer class="app-footer">
        © 2026 Lara Jacqueline Volkmer
      </footer>
    </aside>

    <section class="page-content">
      <div class="learn-header-row">
        <div>
          <h1>Einstellungen</h1>
          <p class="section-sub">
            Theme, Farben, Stimme.
          </p>
        </div>
      </div>
      <div class="grid">
        <div class="card">
          <h2>Farben</h2>
          <div class="label">Primärfarbe (Pink)</div>
          <input id="color-primary" class="input" type="color" value="#9D2A83" style="max-width:120px;"/>

          <div class="label" style="margin-top:.75rem;">Akzentfarbe (Cyan)</div>
          <input id="color-accent" class="input" type="color" value="#66ccff" style="max-width:120px;"/>
        </div>

        <div class="card">
          <h2>Theme</h2>
          <div class="label">Darstellung</div>
          <select id="theme-select" class="input" style="max-width:160px;">
            <option value="neon">Neon Dark (Standard)</option>
            <option value="dark">Dunkel</option>
            <option value="light">Hell</option>
          </select>

          <div class="label" style="margin-top:.75rem;">Vorlese-Stimme</div>
          <select id="voice-select" class="input" style="max-width:200px;">
            <option value="">System Stimme</option>
          </select>
        </div>

        <div class="card">
          <h2>Aktionen</h2>
          <div class="row" style="flex-wrap:wrap;gap:.5rem;">
            <button id="save-settings" class="btn">Speichern</button>
            <button id="reset-settings" class="btn ghost">Zurücksetzen</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lernen · Memoria</title>

  <meta name="theme-color" content="#0f0f1a" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="style.css" />
  <script defer src="main.js"></script>
</head>
<body>
  <!-- Globale Top-Navigation (fixiert oben). Klasse bleibt bottom-nav laut CSS -->
  <nav class="bottom-nav">
    <a href="index.html" >Home</a>
    <a href="learn.html" aria-current="page">Lernen</a>
    <a href="decks.html" >Decks</a>
    <a href="quests.html" >Quests</a>
    <a href="stats.html" >Stats</a>
    <a href="pdf.html" >PDF</a>
    <a href="settings.html" >Einstellungen</a>
  </nav>

  <div class="container layout">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <div class="app-title">Memoria</div>
          <div class="subtitle">Behalte, was zählt.</div>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html" >Home</a>
        <a href="learn.html" aria-current="page">Lernen</a>
        <a href="decks.html" >Decks</a>
        <a href="quests.html" >Quests</a>
        <a href="stats.html" >Statistik</a>
        <a href="pdf.html" >PDF</a>
        <a href="settings.html" >Einstellungen</a>
      </nav>

      <div class="cta">
        <button class="btn">Install</button>
        <button class="btn ghost">Login</button>
      </div>

      <footer class="app-footer">
        © 2026 Lara Jacqueline Volkmer
      </footer>
    </aside>

    <section class="page-content">
      <div class="learn-header-row">
        <div>
          <h1>Lernen</h1>
          <p class="section-sub">
            Wähle ein Deck. Starte eine Session. Bewerte deine Erinnerung.
          </p>
        </div>
      </div>
      <div class="kard" style="margin-bottom:1rem;">
        <div class="label">Deck wählen</div>
        <div class="row" style="flex-wrap:wrap;gap:.5rem;">
          <select id="deck-select" class="input" style="max-width:200px;"></select>
          <button id="start-session" class="btn">Session starten</button>
          <button id="end-session" class="btn ghost">Session beenden</button>
        </div>
      </div>

      <div class="kard" style="margin-bottom:1rem;">
        <div class="label">Aktuelle Karte</div>
        <div id="learn-question" class="learn-question">Keine aktive Session</div>
        <div id="learn-answer" class="learn-answer" style="display:none;"></div>

        <div class="row" style="flex-wrap:wrap;gap:.5rem;margin-top:.75rem;">
          <button id="show-answer" class="btn ghost">Antwort zeigen</button>
        </div>

        <div id="grade-row" class="learn-progress" hidden>
          <button class="btn ghost" data-grade="again">Nochmal</button>
          <button class="btn ghost" data-grade="hard">Schwer</button>
          <button class="btn ghost" data-grade="good">Gut</button>
          <button class="btn ghost" data-grade="easy">Easy</button>
        </div>

        <div class="learn-progress">
          <div class="badge">
            <span id="session-count">0 / 0</span>
          </div>
          <div class="badge">
            <span id="session-progress">0 %</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quests · Memoria</title>

  <meta name="theme-color" content="#0f0f1a" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="style.css" />
  <script defer src="main.js"></script>
</head>
<body>
  <!-- Globale Top-Navigation (fixiert oben). Klasse bleibt bottom-nav laut CSS -->
  <nav class="bottom-nav">
    <a href="index.html" >Home</a>
    <a href="learn.html" >Lernen</a>
    <a href="decks.html" >Decks</a>
    <a href="quests.html" aria-current="page">Quests</a>
    <a href="stats.html" >Stats</a>
    <a href="pdf.html" >PDF</a>
    <a href="settings.html" >Einstellungen</a>
  </nav>

  <div class="container layout">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <div class="app-title">Memoria</div>
          <div class="subtitle">Behalte, was zählt.</div>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html" >Home</a>
        <a href="learn.html" >Lernen</a>
        <a href="decks.html" >Decks</a>
        <a href="quests.html" aria-current="page">Quests</a>
        <a href="stats.html" >Statistik</a>
        <a href="pdf.html" >PDF</a>
        <a href="settings.html" >Einstellungen</a>
      </nav>

      <div class="cta">
        <button class="btn">Install</button>
        <button class="btn ghost">Login</button>
      </div>

      <footer class="app-footer">
        © 2026 Lara Jacqueline Volkmer
      </footer>
    </aside>

    <section class="page-content">
      <div class="learn-header-row">
        <div>
          <h1>Quests</h1>
          <p class="section-sub">
            Erledige Aufgaben. Sammle XP. Steig im Level.
          </p>
        </div>

        <!-- XP / Level Box nur hier sichtbar -->
        <div class="user-level-box">
          <div id="user-level-badge" class="user-level-badge">Level 1</div>
          <div class="user-xp-bar">
            <div id="user-xp-fill" class="user-xp-fill" style="width:0%"></div>
          </div>
          <div class="user-xp-text">
            <span>
              <span id="user-xp-current">0</span>/<span id="user-xp-next">100</span> XP
            </span>
            <span>Gesamt: <span id="dash-xp">0</span></span>
          </div>
        </div>
      </div>
      <div class="kard" style="margin-bottom:1rem;">
        <div class="label">Neue Quest</div>
        <div class="row" style="flex-wrap:wrap;gap:.5rem;">
          <input id="quest-title" class="input" placeholder="Aufgabe..." style="max-width:200px;" />
          <input id="quest-xp" class="input" type="number" value="10" style="max-width:80px;" />
          <button id="add-quest" class="btn">Quest hinzufügen</button>
        </div>
      </div>

      <div class="kard">
        <div class="label">Offene Quests</div>
        <div id="quest-list" class="section-sub">Keine Quests</div>
      </div>
    </section>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
</body>
</html>
